
<!DOCTYPE html>
<html lang="en">
<head>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>LoneStar Analytics</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./src/styles/Timeline.css" />
  <link rel="stylesheet" href="./src/styles/EventsAdmin.css" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- ADDED: Chart.js dependency for PlayerRadar -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="global-loader" aria-live="polite">
    <div class="global-loader__box">
      <div class="global-loader__title">Loading LoneStar Analytics</div>
      <div class="global-loader__subtitle">
        Preparing interactive dashboards and simulation views
      </div>
      <div class="global-loader__bar">
        <div class="global-loader__fill"></div>
      </div>
    </div>
  </div>

  <div class="top-debug-strip">
    <span id="route-indicator">Route: dashboard</span>
    <span id="network-status">Network: online</span>
  </div>

  <div id="scroll-progress"></div>

  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar__logo">
        <div class="star-icon">★</div>
        <div class="sidebar__title">LoneStar<br/><span>Analytics</span></div>
      </div>

      <nav class="sidebar__nav" aria-label="Main navigation">
        <div class="nav-group">
          <div class="nav-header">Intelligence</div>
          <button class="nav-link active" data-page="dashboard">Dashboard</button>
          <button class="nav-link" data-page="analytics">Analytics</button>
          <button class="nav-link" data-page="insights">League Insights</button>
          <button class="nav-link" data-page="history">History</button>
          <button class="nav-link" data-page="profile">User Profile</button>
        </div>

        <div class="nav-group">
          <div class="nav-header">Strategy</div>
          <button class="nav-link" data-page="simulator">AI Story Simulator</button>
          <button class="nav-link" data-page="matchup">Matchup Simulator</button>
          <button class="nav-link" data-page="paths">Season Paths</button>
          <button class="nav-link" data-page="quantum">Quantum Engine</button>
        </div>

        <div class="nav-group">
          <div class="nav-header">Scouting</div>
          <button class="nav-link" data-page="team-profile">Team Profile</button>
          <button class="nav-link" data-page="compare">Team Comparison</button>
          <button class="nav-link" data-page="schedule-strength">Schedule Strength</button>
          <button class="nav-link" data-page="rival">Rival Impact</button>
        </div>

        <div class="nav-group">
          <div class="nav-header">League HQ</div>
          <button class="nav-link" data-page="standings">Standings</button>
          <button class="nav-link" data-page="playoff">Playoff Pulse</button>
          <button class="nav-link" data-page="division">Division Power</button>
          <button class="nav-link" data-page="conference">Conference Race</button>
          <button class="nav-link" data-page="forecast">League Forecast</button>
          <button class="nav-link" data-page="liveprob">Live Win Prob</button>
          <button class="nav-link" data-page="clutch">Clutch Index</button>
          <button class="nav-link" data-page="timeline">Timeline</button>
          <button class="nav-link" data-page="events">Events Admin</button>
        </div>
      </nav>
    </aside>

    <main class="main-stage">
      <header class="dashboard-header">
        <div class="header-breadcrumb">
          <span id="active-category">Intelligence</span>
          <span class="chevron">/</span>
          <span id="active-page">Dashboard</span>
        </div>
        
        <div class="header-actions">
          <div class="team-selector-compact" id="team-nav-anchor"></div>
          <div class="system-status">
            <span class="status-indicator"></span>
            <span id="network-status">Online</span>
          </div>
        </div>
      </header>
      <div id="root"></div>
    </main>
  </div>

  <script type="text/babel" src="./src/api.js"></script>
  <script type="text/babel" src="./src/components/UserProfileCard.jsx"></script>
  <script type="text/babel" src="./src/components/RecordCard.jsx"></script>
  <script type="text/babel" src="./src/components/TSICard.jsx"></script>
  <script type="text/babel" src="./src/components/MustWinCard.jsx"></script>
  <script type="text/babel" src="./src/components/LiveWinProbTool.jsx"></script>
  <script type="text/babel" src="./src/components/GameTable.jsx"></script>
  <script type="text/babel" src="./src/components/PlayerRadar.jsx"></script>
  <script type="text/babel" src="./src/components/Maps.jsx"></script>
  <script type="text/babel" src="./src/components/ClutchIndex.jsx"></script>
  <script type="text/babel" src="./src/components/EventsAdmin.jsx"></script>
  <script type="text/babel" src="./src/components/Timeline.jsx"></script>
  <script type="text/babel" src="./src/components/RivalTeamImpactPage.jsx"></script>
  <script type="text/babel" src="./src/components/StandingsPage.jsx"></script>
  <script type="text/babel" src="./src/components/TeamComparisonPage.jsx"></script>
  <script type="text/babel" src="./src/components/DivisionPowerPage.jsx"></script>
  <script type="text/babel" src="./src/components/LeagueForecastPage.jsx"></script>
  <script type="text/babel" src="./src/components/PlayoffPulsePage.jsx"></script>
  <script type="text/babel" src="./src/components/MatchupSimulatorPage.jsx"></script>
  <script type="text/babel" src="./src/components/ScheduleStrengthPage.jsx"></script>
  <script type="text/babel" src="./src/components/DetailedTeamProfilePage.jsx"></script>
  <script type="text/babel" src="./src/components/ConferenceRacePage.jsx"></script>
  <script type="text/babel" src="./src/components/LeagueInsightsPage.jsx"></script>
  <script type="text/babel" src="./src/components/SeasonPathExplorer.jsx"></script>
  <script type="text/babel" src="./src/components/PlayoffGauge.jsx"></script>
  <script type="text/babel" src="./src/components/HistoryPage.jsx"></script>
  <script type="text/babel" src="./src/components/AIStorySimulator.jsx"></script>
  <script type="text/babel" src="./src/components/QuantumEngineIntegrated.jsx"></script>
  <script type="text/babel" src="./src/main.jsx"></script>

  <script>
    (function () {
      "use strict";

      function hideLoader() {
        var loader = document.getElementById("global-loader");
        if (!loader) return;
        loader.style.opacity = "0";
        loader.style.pointerEvents = "none";
        setTimeout(function () {
          loader.style.display = "none";
        }, 420);
      }

      setTimeout(hideLoader, 1400);

      window.addEventListener("load", function () {
        setTimeout(hideLoader, 350);
      });

      var waitForRoot = setInterval(function () {
        var root = document.getElementById("root");
        if (root && root.children.length > 0) {
          clearInterval(waitForRoot);
          hideLoader();
        }
      }, 120);

      setTimeout(function () {
        clearInterval(waitForRoot);
      }, 3000);

      function setNetworkStatus(online) {
        var el = document.getElementById("network-status");
        if (!el) return;
        el.textContent = (online ? "Online" : "Offline");
        el.style.color = online ? "" : "#ff6b6b";
      }

      window.addEventListener("online", function () {
        setNetworkStatus(true);
      });

      window.addEventListener("offline", function () {
        setNetworkStatus(false);
      });

      window.addEventListener(
        "scroll",
        function () {
          var docH = document.body.scrollHeight - window.innerHeight;
          var pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
          var bar = document.getElementById("scroll-progress");
          if (bar) bar.style.width = pct + "%";
        },
        { passive: true }
      );
    })();
  </script>
</body>
</html>
